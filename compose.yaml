services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: teamsync
      POSTGRES_USER: teamsync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamsync_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - teamsync_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamsync -d teamsync"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      HTTP_ADDRESS: :8080
      DATABASE_URL: postgres://teamsync:${POSTGRES_PASSWORD:-teamsync_dev_password}@postgres:5432/teamsync?sslmode=disable
      FRONTEND_ORIGIN: http://localhost:3001
      COOKIE_SECURE: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  teamsync_postgres_data:
